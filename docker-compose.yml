services:
  oidc-server:
    image: oidc-server-${BRANCH_SUFFIX}:latest
    container_name: oidc-server
    ports:
      - "8081:80"
    networks:
      - branch_net

  oidc-client:
    image: oidc-client-${BRANCH_SUFFIX}:latest
    container_name: oidc-client
    depends_on:
      - oidc-server
    networks:
      - branch_net

networks:
  branch_net:
    external: true