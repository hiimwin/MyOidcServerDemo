version: "3.9"
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: oidc-server
    ports:
      - "5000:5000"
    environment:
      - DOTNET_ENVIRONMENT=Docker

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: oidc-client
    ports:
      - "5001:5001"
    environment:
      - DOTNET_ENVIRONMENT=Docker
      - SERVER_URL=http://server:5000  # server base URL trong docker network
    depends_on:
      - server