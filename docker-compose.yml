version: "3.9"

networks:
  oidc-net:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: oidc-api
    ports:
      - "5000:5000"
    networks:
      - oidc-net
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: oidc-client
    ports:
      - "8080:8080"
    networks:
      - oidc-net