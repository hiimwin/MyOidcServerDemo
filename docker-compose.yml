services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: oidc-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080   
    networks:
      - oidc-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: oidc-client
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080   
    depends_on:
      - api
    networks:
      - oidc-net

networks:
  oidc-net:
    driver: bridge